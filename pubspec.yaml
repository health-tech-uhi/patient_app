name: patient_app
description: "BlueSpan patient mobile app — parity with patient-web-app."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  dio: ^5.9.2
  file_picker: ^10.3.10
  flutter:
    sdk: flutter
  flutter_dotenv: ^6.0.0
  flutter_riverpod: ^3.3.1
  flutter_secure_storage: ^10.0.0
  go_router: ^17.1.0
  google_fonts: ^6.2.1
  intl: ^0.20.2
  mime: ^2.0.0
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
